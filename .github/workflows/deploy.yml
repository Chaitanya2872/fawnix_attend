name: Deploy Fawnix Backend

on:
  push:
    branches:
      - main

  # Allows you to run deployment manually from GitHub Actions
  workflow_dispatch:

concurrency:
  group: fawnix-production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SSH deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass netcat-openbsd

      - name: Deploy application
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -e

          : "${SERVER_IP:?SERVER_IP secret is required}"
          : "${SERVER_USER:?SERVER_USER secret is required}"
          : "${SERVER_PASSWORD:?SERVER_PASSWORD secret is required}"
          SERVER_PORT="${SERVER_PORT:-22}"

          echo "Checking SSH reachability on ${SERVER_IP}:${SERVER_PORT}..."
          if ! nc -zvw20 "$SERVER_IP" "$SERVER_PORT"; then
            echo "Unable to reach ${SERVER_IP}:${SERVER_PORT} from the GitHub Actions runner."
            echo "Check SERVER_IP/SERVER_PORT, server firewall/security group, SSH daemon, and whether the server allows GitHub-hosted runners."
            exit 255
          fi

          sshpass -p "$SERVER_PASSWORD" ssh \
            -p "$SERVER_PORT" \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ConnectTimeout=30 \
            "$SERVER_USER@$SERVER_IP" << 'EOF'
          set -e

          echo "Starting deployment..."

          cd /root/fawnix_attend

          echo "Current directory:"
          pwd

          echo "Fetching latest code..."
          git fetch origin main

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "Stashing local tracked changes..."
            git stash push -m "github-actions-predeploy-$(date +%Y%m%d-%H%M%S)"
          fi

          echo "Pulling latest code..."
          git checkout main
          git pull --ff-only origin main

          echo "Building Docker containers..."
          docker compose build --no-cache

          echo "Starting Docker containers..."
          docker compose up -d --remove-orphans

          echo "Container status:"
          docker compose ps

          echo "Deployment completed successfully."
          EOF
