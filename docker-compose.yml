version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: employee_db
    environment:
      TZ: Asia/Kolkata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Intimation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: employee_app
    environment:
      TZ: Asia/Kolkata
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: Intimation
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      MEETING_NOTES_S3_BUCKET: ${bucket_name}
      MEETING_NOTES_S3_REGION: ${mom_S3_REGION}
      MEETING_NOTES_AWS_ACCESS_KEY_ID: ${mom_AWS_ACCESS_KEY_ID}
      MEETING_NOTES_AWS_SECRET_ACCESS_KEY: ${momAWS_SECRET_ACCESS_KEY}
      MEETING_NOTES_S3_AUDIO_PREFIX: ${MEETING_NOTES_S3_AUDIO_PREFIX:-meeting-notes/audio}
      MEETING_NOTES_S3_REPORT_PREFIX: ${MEETING_NOTES_S3_REPORT_PREFIX:-meeting-notes/generated-reports}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 8

  nginx:
    image: nginx:alpine
    container_name: employee_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
