version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: employee_db
    environment:
      TZ: Asia/Kolkata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Intimation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: employee_minio
    environment:
      TZ: Asia/Kolkata
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fawnixminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fawnixminio123}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  app:
    build: .
    container_name: employee_app
    environment:
      TZ: Asia/Kolkata
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: Intimation
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-fawnixminio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-fawnixminio123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-fawnix-meeting-notes}
      MINIO_MEETING_AUDIO_PREFIX: ${MINIO_MEETING_AUDIO_PREFIX:-meeting-audio}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "5000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: employee_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
