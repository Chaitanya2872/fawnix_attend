version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: employee_db
    environment:
      TZ: Asia/Kolkata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: Intimation
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: employee_app
    environment:
      TZ: Asia/Kolkata
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: Intimation
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      MEETING_NOTES_S3_BUCKET: ${bucket_name}
      MEETING_NOTES_S3_REGION: ${mom_S3_REGION}
      MEETING_NOTES_AWS_ACCESS_KEY_ID: ${mom_AWS_ACCESS_KEY_ID}
      MEETING_NOTES_AWS_SECRET_ACCESS_KEY: ${momAWS_SECRET_ACCESS_KEY}
      MEETING_NOTES_S3_AUDIO_PREFIX: ${MEETING_NOTES_S3_AUDIO_PREFIX:-meeting-notes/audio}
      MEETING_NOTES_S3_REPORT_PREFIX: ${MEETING_NOTES_S3_REPORT_PREFIX:-meeting-notes/generated-reports}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL}
      MEETING_NOTES_USE_LOCAL_TRANSCRIPTION: ${MEETING_NOTES_USE_LOCAL_TRANSCRIPTION:-False}
      MEETING_NOTES_ENABLE_DIARIZATION: ${MEETING_NOTES_ENABLE_DIARIZATION:-False}
      MEETING_NOTES_FASTER_WHISPER_MODEL: ${MEETING_NOTES_FASTER_WHISPER_MODEL:-small}
      MEETING_NOTES_FASTER_WHISPER_DEVICE: ${MEETING_NOTES_FASTER_WHISPER_DEVICE:-cpu}
      MEETING_NOTES_FASTER_WHISPER_COMPUTE_TYPE: ${MEETING_NOTES_FASTER_WHISPER_COMPUTE_TYPE:-int8}
      MEETING_NOTES_DIARIZATION_MODEL: ${MEETING_NOTES_DIARIZATION_MODEL:-pyannote/speaker-diarization-3.1}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      MEETING_NOTES_REQUEST_TIMEOUT: ${MEETING_NOTES_REQUEST_TIMEOUT:-300}
      FEATURE_MEETING_NOTES: ${FEATURE_MEETING_NOTES:-True}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 8

  meeting_notes_worker:
    build: .
    container_name: employee_meeting_notes_worker
    command: ["python", "scripts/run_meeting_notes_worker.py"]
    environment:
      TZ: Asia/Kolkata
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: Intimation
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      MEETING_NOTES_S3_BUCKET: ${bucket_name}
      MEETING_NOTES_S3_REGION: ${mom_S3_REGION}
      MEETING_NOTES_AWS_ACCESS_KEY_ID: ${mom_AWS_ACCESS_KEY_ID}
      MEETING_NOTES_AWS_SECRET_ACCESS_KEY: ${momAWS_SECRET_ACCESS_KEY}
      MEETING_NOTES_S3_AUDIO_PREFIX: ${MEETING_NOTES_S3_AUDIO_PREFIX:-meeting-notes/audio}
      MEETING_NOTES_S3_REPORT_PREFIX: ${MEETING_NOTES_S3_REPORT_PREFIX:-meeting-notes/generated-reports}
      MEETING_NOTES_QUEUE_POLL_SECONDS: ${MEETING_NOTES_QUEUE_POLL_SECONDS:-5}
      MEETING_NOTES_QUEUE_MAX_RETRIES: ${MEETING_NOTES_QUEUE_MAX_RETRIES:-3}
      MEETING_NOTES_QUEUE_RETRY_DELAY_SECONDS: ${MEETING_NOTES_QUEUE_RETRY_DELAY_SECONDS:-30}
      MEETING_NOTES_QUEUE_STALE_MINUTES: ${MEETING_NOTES_QUEUE_STALE_MINUTES:-20}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL}
      MEETING_NOTES_USE_LOCAL_TRANSCRIPTION: ${MEETING_NOTES_USE_LOCAL_TRANSCRIPTION:-False}
      MEETING_NOTES_ENABLE_DIARIZATION: ${MEETING_NOTES_ENABLE_DIARIZATION:-False}
      MEETING_NOTES_FASTER_WHISPER_MODEL: ${MEETING_NOTES_FASTER_WHISPER_MODEL:-small}
      MEETING_NOTES_FASTER_WHISPER_DEVICE: ${MEETING_NOTES_FASTER_WHISPER_DEVICE:-cpu}
      MEETING_NOTES_FASTER_WHISPER_COMPUTE_TYPE: ${MEETING_NOTES_FASTER_WHISPER_COMPUTE_TYPE:-int8}
      MEETING_NOTES_DIARIZATION_MODEL: ${MEETING_NOTES_DIARIZATION_MODEL:-pyannote/speaker-diarization-3.1}
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      MEETING_NOTES_REQUEST_TIMEOUT: ${MEETING_NOTES_REQUEST_TIMEOUT:-300}
      FEATURE_MEETING_NOTES: ${FEATURE_MEETING_NOTES:-True}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  nginx:
    image: nginx:alpine
    container_name: employee_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
